<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Vyve</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { padding: 20px; }
        .checkmark { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 32px; margin-bottom: 10px; }
        p { margin-bottom: 30px; opacity: 0.9; }
        .btn { background: white; color: #667eea; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">✅</div>
        <h1>Payment Successful!</h1>
        <p>Your coins have been added to your account.</p>
        <a href="/" class="btn">Back to Vyve</a>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const coins = urlParams.get('coins');
        const username = urlParams.get('username');
        
        if (coins && username) {
            let userData = localStorage.getItem('vyve_user');
            if (userData) {
                userData = JSON.parse(userData);
                userData.coins = (userData.coins || 0) + parseInt(coins);
                localStorage.setItem('vyve_user', JSON.stringify(userData));
            }
        }
        
        setTimeout(() => { window.location.href = '/'; }, 3000);
    </script>
</body>
</html>
